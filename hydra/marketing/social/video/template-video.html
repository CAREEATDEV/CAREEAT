<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* ── même charte que template-hook-post.html (NE PAS diverger) ─────────── */
  @font-face{font-family:'Chakra';src:url('__FONT_DISPLAY__') format('truetype');font-weight:700;}
  @font-face{font-family:'ChakraSemi';src:url('__FONT_LABEL__') format('truetype');font-weight:600;}
  @font-face{font-family:'Plex';src:url('__FONT_MONO__') format('truetype');font-weight:400;}
  @font-face{font-family:'PlexBold';src:url('__FONT_MONOBOLD__') format('truetype');font-weight:700;}

  :root{
    --bg:#000000; --bgSoft:#101216;
    --green:#3EE07A; --greenDeep:#2ECC6A;
    --amber:#FFB020; --red:#FF3B4A; --poison:#B44CFF;
    --empty:#1C2026; --text:#EDEFF2; --dim:#7C828C;
    --accent:#3EE07A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;background:var(--bg);overflow:hidden;}
  body{
    font-family:'Plex',monospace;
    display:flex;flex-direction:column;
    padding:0 84px;
  }

  /* ── barre de vie (persistante, animée pendant la démo) ────────────────── */
  .barzone{position:relative;margin-top:110px;}
  .segbar{display:flex;gap:10px;}
  .seg{flex:1;height:16px;border-radius:4px;background:var(--empty);}
  .barcap{
    position:absolute;top:calc(100% + 18px);left:0;
    font-family:'PlexBold';font-size:27px;letter-spacing:3px;
    opacity:0;
  }
  #capdry{color:var(--red);}
  #capwet{color:var(--green);}

  .eyebrow{
    font-family:'ChakraSemi';color:var(--dim);font-size:27px;
    letter-spacing:6px;text-transform:uppercase;margin-top:82px;
  }
  .eyebrow b{color:var(--accent);}

  /* ── scène centrale ────────────────────────────────────────────────────── */
  .scene{position:relative;flex:1;margin-top:64px;}

  .hookwrap{position:absolute;top:0;left:0;right:0;}
  .hook{
    font-family:'Chakra';color:var(--text);
    font-size:82px;line-height:1.18;letter-spacing:0.5px;
    text-wrap:balance;
  }
  .hook .accent,.line .accent{color:var(--accent);}

  .lines{position:absolute;top:0;left:0;right:0;}
  .line{
    font-family:'Chakra';color:var(--text);
    font-size:50px;line-height:1.3;letter-spacing:0.4px;
    margin-bottom:34px;
    opacity:0;
  }

  .answer{
    position:absolute;left:0;right:0;top:34%;
    font-family:'Chakra';color:var(--accent);
    font-size:82px;line-height:1.16;letter-spacing:0.5px;
    text-wrap:balance;
    opacity:0;
  }

  /* ── finale : CTA + marque (mêmes styles que la carte image) ───────────── */
  .cta{
    display:flex;align-items:center;gap:16px;
    border-top:2px solid var(--empty);
    padding-top:36px;
    opacity:0;
  }
  .cta .arrow{font-family:'PlexBold';color:var(--accent);font-size:36px;}
  .cta .ctatxt{
    font-family:'ChakraSemi';color:var(--text);font-size:30px;
    letter-spacing:2px;text-transform:uppercase;
  }
  .brand{
    font-family:'Chakra';color:var(--dim);font-size:24px;
    letter-spacing:8px;margin:30px 0 72px;
  }
  .brand b{color:var(--text);}

  /* ── keyframes (toute l'anim est du CSS pur ; le JS ne fait que poser
       les delays calculés — la capture pilote ensuite currentTime) ───────── */
  @keyframes hookout{to{opacity:0;transform:translateY(-34px);}}
  @keyframes rise{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
  @keyframes dimout{to{opacity:0.07;}}
  @keyframes punch{from{opacity:0;transform:scale(0.93);}to{opacity:1;transform:scale(1);}}
  @keyframes fadein{to{opacity:1;}}
  @keyframes fadeout{to{opacity:0;}}

  /* démo barre de vie */
  @keyframes panic{from{background:var(--accent);}to{background:var(--red);}}
  @keyframes segoff{from{background:var(--red);}to{background:var(--empty);}}
  @keyframes segfill{
    from{background:var(--empty);}
    45%{background:#B8FFD4;}
    to{background:var(--green);}
  }
  @keyframes segrevive{
    from{background:var(--red);}
    45%{background:#B8FFD4;}
    to{background:var(--green);}
  }
</style>
</head>
<body>
  <div class="barzone">
    <div class="segbar" id="segbar"></div>
    <div class="barcap" id="capdry">TU SÈCHES.</div>
    <div class="barcap" id="capwet">TU REBOIS.</div>
  </div>

  <div class="eyebrow">HYDRA <b>·</b> SCIENCE</div>

  <div class="scene">
    <div class="hookwrap" id="hookwrap"><div class="hook" id="hook"></div></div>
    <div class="lines" id="lines"></div>
    <div class="answer" id="answer"></div>
  </div>

  <div class="cta" id="cta">
    <div class="arrow">&darr;</div>
    <div class="ctatxt" id="ctatxt"></div>
  </div>

  <div class="brand">HYDR<b>A</b></div>

<script>
  // Contenu injecté par render-video.js (hook, lines, answer, accent, seg…).
  const CONTENT = __CONTENT_JSON__;

  const ACCENTS = { green:'#3EE07A', amber:'#FFB020', red:'#FF3B4A', poison:'#B44CFF' };

  // *mot* → <span class="accent">mot</span> (après échappement HTML)
  function fmt(t){
    const esc = String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return esc.replace(/\*([^*]+)\*/g, '<span class="accent">$1</span>');
  }

  // ── timeline (ms) ─────────────────────────────────────────────────────────
  const HOLD_HOOK = 2000, TRANS = 400;
  const n = CONTENT.lines.length;
  const lineStep = n >= 5 ? 900 : 1000;
  const linesStart = HOLD_HOOK + TRANS;
  const half = Math.ceil(n / 2);
  const demoStart = linesStart + half * lineStep + 200;
  const DEMO = 3000;
  const restStart = demoStart + DEMO;
  const linesEnd = restStart + (n - half) * lineStep;
  const answerStart = linesEnd + 300;
  const ctaStart = answerStart + 1000;
  const TOTAL = ctaStart + 2200;

  const lineDelay = (i) =>
    i < half ? linesStart + i * lineStep : restStart + (i - half) * lineStep;

  // ── mise en place du DOM + delays ─────────────────────────────────────────
  document.documentElement.style.setProperty('--accent',
    ACCENTS[CONTENT.accent] || ACCENTS.green);

  document.getElementById('hook').innerHTML = fmt(CONTENT.hook);
  document.getElementById('hookwrap').style.animation =
    `hookout ${TRANS}ms ease-in ${HOLD_HOOK}ms forwards`;

  const linesEl = document.getElementById('lines');
  CONTENT.lines.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'line';
    d.innerHTML = fmt(t);
    d.style.animation =
      `rise 420ms cubic-bezier(.2,.7,.2,1) ${lineDelay(i)}ms both,` +
      `dimout 400ms ease ${answerStart - 100}ms forwards`;
    linesEl.appendChild(d);
  });

  const ans = document.getElementById('answer');
  ans.innerHTML = fmt(CONTENT.answer);
  ans.style.animation = `punch 500ms cubic-bezier(.2,.7,.2,1) ${answerStart}ms both`;

  document.getElementById('ctatxt').textContent =
    CONTENT.cta_video || 'WAITLIST OUVERTE · LIEN EN BIO';
  document.getElementById('cta').style.animation =
    `rise 420ms ease-out ${ctaStart}ms both`;

  // ── démo barre de vie : draine (vers le rouge) puis remonte (vert) ────────
  const seg0 = Math.max(2, Math.min(7, CONTENT.seg ?? 6));
  const drainStart = demoStart + 300;      // après le passage au rouge
  const refillStart = demoStart + 1900;    // remontée franche
  const bar = document.getElementById('segbar');
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'seg';
    const anims = [];
    if (i < seg0) {
      s.style.background = 'var(--accent)';
      anims.push(`panic 300ms linear ${demoStart}ms forwards`);
      if (i === 0) {
        // le segment survivant : jamais éteint, il "revit" à la remontée
        anims.push(`segrevive 260ms linear ${refillStart}ms forwards`);
      } else {
        // extinction de droite à gauche
        const k = seg0 - 1 - i; // i=seg0-1 s'éteint en premier
        anims.push(`segoff 180ms linear ${drainStart + k * 140}ms forwards`);
        anims.push(`segfill 260ms linear ${refillStart + i * 85}ms forwards`);
      }
    } else {
      anims.push(`segfill 260ms linear ${refillStart + i * 85}ms forwards`);
    }
    s.style.animation = anims.join(',');
    bar.appendChild(s);
  }
  // microcopy sous la barre
  document.getElementById('capdry').style.animation =
    `fadein 200ms ease ${demoStart}ms forwards, fadeout 160ms ease ${refillStart - 60}ms forwards`;
  document.getElementById('capwet').style.animation =
    `fadein 160ms ease ${refillStart}ms forwards, fadeout 220ms ease ${demoStart + 2800}ms forwards`;

  // ── pilotage frame par frame (capture déterministe) ───────────────────────
  window.__TOTAL_MS__ = TOTAL;
  window.__seek = (ms) => {
    document.getAnimations().forEach(a => { a.pause(); a.currentTime = ms; });
  };
</script>
</body>
</html>
